# Render Blueprint: https://render.com/docs/blueprint-spec
# Dashboard: set MONGODB_URI (MongoDB Atlas) and ALLOWED_ORIGINS (your Vercel URL(s), comma-separated).
services:
  - type: web
    runtime: node
    name: mental-health-analytics-api
    branch: main
    plan: free
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: MONGODB_URI
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
      - key: JWT_SECRET
        generateValue: true
